* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: Arial, sans-serif; background:#f5f5f5; }
#header { background:#fff; padding:12px 20px; border-bottom:1px solid #ddd; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
#header h1 { font-size:17px; font-weight:700; color:#222; }
#stats { display:flex; gap:16px; flex-wrap:wrap; }
.stat { text-align:center; }
.stat-n { font-size:20px; font-weight:700; }
.stat-l { font-size:11px; color:#777; }
#legend { background:#fff; padding:8px 20px; border-bottom:1px solid #ddd; display:flex; gap:20px; flex-wrap:wrap; align-items:center; }
.leg { display:flex; align-items:center; gap:7px; font-size:13px; color:#333; }
.dot { width:13px; height:13px; border-radius:50%; flex-shrink:0; }
#filters { background:#fff; padding:8px 20px; border-bottom:1px solid #ddd; display:flex; gap:8px; flex-wrap:wrap; }
.fbtn { padding:5px 14px; border:1px solid #ccc; border-radius:20px; font-size:12px; cursor:pointer; background:#fff; color:#333; }
.fbtn.active { background:#1a73e8; color:#fff; border-color:#1a73e8; }
#map { width:100%; height:calc(100vh - 140px); min-height:400px; }
.popup-name { font-weight:700; font-size:14px; margin-bottom:4px; }
.popup-cat { font-size:12px; color:#555; }
.popup-code { font-size:11px; color:#888; margin-top:3px; font-family:monospace; }
.popup-gmaps { display:inline-block; margin-top:8px; padding:5px 12px; background:#1a73e8; color:#fff; border-radius:4px; font-size:12px; text-decoration:none; }

  const svg = "<svg xmlns='http://www.w3.org/2000/svg' width='24' height='32' viewBox='0 0 24 32'><path d='M12 0C5.4 0 0 5.4 0 12c0 8.4 12 20 12 20S24 20.4 24 12C24 5.4 18.6 0 12 0z' fill='" + color + "'/><circle cx='12' cy='12' r='5' fill='white'/></svg>";

      else map.removeLayer(m);
